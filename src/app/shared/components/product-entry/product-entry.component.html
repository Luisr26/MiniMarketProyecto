<div class="entry-page">
  
  <div class="entry-header">
    <div class="flex items-center gap-4">
      <div class="header-badge">STOCK MANAGER</div>
      <div>
        <h1 class="entry-title">Registro de Abastecimiento</h1>
        <p class="entry-subtitle">Gestione la entrada de nueva mercancía al inventario central.</p>
      </div>
    </div>
  </div>

  <div class="entry-grid">
    <!-- Main Form -->
    <div class="form-container">
      <div class="card-premium">
        <div class="card-header-accent">
          <span nz-icon nzType="form" nzTheme="outline"></span>
          Detalles de la Operación
        </div>
        
        <div class="card-body-p">
          <div class="form-field-lg">
            <label class="label-p">PRODUCTO A ABASTECER</label>
            <nz-select 
              nzShowSearch 
              nzAllowClear 
              nzPlaceHolder="Seleccione un producto del catálogo..." 
              [(ngModel)]="selectedProductId" 
              class="select-p">
              <nz-option *ngFor="let p of products" [nzLabel]="p.name + ' - ' + p.sku" [nzValue]="p.id"></nz-option>
            </nz-select>
          </div>

          <div class="form-row-p">
            <div class="form-field-p">
              <label class="label-p">CANTIDAD (UNIDADES)</label>
              <nz-input-group [nzPrefix]="prefixQty">
                <input type="number" nz-input [(ngModel)]="entryQuantity" placeholder="0" class="input-p" />
              </nz-input-group>
              <ng-template #prefixQty><span nz-icon nzType="number"></span></ng-template>
            </div>
            <div class="form-field-p">
              <label class="label-p">REFERENCIA / FACTURA</label>
              <nz-input-group [nzPrefix]="prefixRef">
                <input type="text" nz-input [(ngModel)]="entryNote" placeholder="Ej: FAC-2024-001" class="input-p" />
              </nz-input-group>
              <ng-template #prefixRef><span nz-icon nzType="file-text"></span></ng-template>
            </div>
          </div>

          <div class="action-wrap">
            <button class="btn-register-p" [disabled]="!selectedProductId || !entryQuantity" (click)="registerEntry()">
              <span nz-icon nzType="plus-circle" nzTheme="outline"></span>
              PROCESAR INGRESO DE STOCK
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent History -->
    <div class="history-side">
      <div class="card-premium h-full overflow-hidden">
        <div class="card-header-accent bg-gray-50 border-b border-gray-100">
          <span nz-icon nzType="history" nzTheme="outline"></span>
          Registro de Actividad
        </div>
        
        <div class="activity-scroll">
          <div class="activity-card" *ngFor="let entry of recentEntries">
            <div class="act-indicator"></div>
            <div class="act-content">
</div>
